baseURL = "https://vlapp0r.github.io/high-protein-meals/"
languageCode = "en"
title = "The Protein Budget"
theme = "blowfish"
defaultContentLanguage = "en"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 12

# Required by Blowfish on Hugo 0.128+ — the theme reads site.Language.Locale
# Without this block the build fails with "can't evaluate field Locale"
[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "The Protein Budget"

    [languages.en.params]
      description = "High protein meals on a budget. Real recipes, real macros, real savings."
      author = "The Protein Budget"

[params]
  colorScheme = "ocean"
  defaultAppearance = "light"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  mainSections = ["posts"]

  [params.homepage]
    layout = "background"
    showRecent = true
    recentLimit = 6

  [params.article]
    showDate = true
    showAuthor = false
    showReadingTime = true
    showTableOfContents = true
    showRelatedContent = true
    showBreadcrumbs = true
    showShare = true

  [params.list]
    showCards = true
    showTableOfContents = false

  [params.footer]
    showCopyright = true
    showScrollToTop = true

  [params.seo]
    siteName = "The Protein Budget"

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    name = "Home"
    url = "https://vlapp0r.github.io/high-protein-meals/"
    weight = 1
  [[menu.main]]
    name = "Recipes"
    url = "https://vlapp0r.github.io/high-protein-meals/posts/"
    weight = 2
  [[menu.main]]
    name = "Categories"
    url = "https://vlapp0r.github.io/high-protein-meals/categories/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "https://vlapp0r.github.io/high-protein-meals/about/"
    weight = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]
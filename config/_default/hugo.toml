# config/_default/hugo.toml
baseURL = "https://gainsonadime.com/"
languageCode = "en"
defaultContentLanguage = "en"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
theme = "blowfish"

[pagination]
  pagerSize = 12

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false

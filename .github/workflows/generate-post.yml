name: Generate weekly recipe post

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      recipe_name:
        description: "Recipe name (e.g. 'Spicy Tuna Rice Bowl'). Leave blank for random topic."
        required: false
        default: ""
      ingredients:
        description: "Key ingredients, comma separated (e.g. 'canned tuna, rice, sriracha, cucumber')"
        required: false
        default: ""
      protein_per_serving:
        description: "Approximate protein per serving in grams (e.g. '32')"
        required: false
        default: ""
      cost_per_serving:
        description: "Approximate cost per serving in USD (e.g. '1.80')"
        required: false
        default: ""
      servings:
        description: "Number of servings the recipe makes (e.g. '4')"
        required: false
        default: "4"
      notes:
        description: "Any extra notes for Claude — cooking method, dietary info, tips to include, tone (e.g. 'make it meal prep friendly, mention air fryer option')"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate post via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_RECIPE_NAME: ${{ github.event.inputs.recipe_name }}
          INPUT_INGREDIENTS: ${{ github.event.inputs.ingredients }}
          INPUT_PROTEIN: ${{ github.event.inputs.protein_per_serving }}
          INPUT_COST: ${{ github.event.inputs.cost_per_serving }}
          INPUT_SERVINGS: ${{ github.event.inputs.servings }}
          INPUT_NOTES: ${{ github.event.inputs.notes }}
        run: node scripts/generate-post.js

      - name: Get generated filename
        id: get-filename
        run: |
          FILENAME=$(ls content/posts/*.md | sort | tail -n 1)
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          SLUG=$(basename "$FILENAME" .md)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add generated post: ${{ steps.get-filename.outputs.slug }}"
          branch: "auto/post-${{ steps.get-filename.outputs.slug }}"
          title: "New recipe post: ${{ steps.get-filename.outputs.slug }}"
          body: |
            This post was automatically generated by Claude (claude-sonnet-4-6).

            **Recipe details provided:**
            - Name: ${{ github.event.inputs.recipe_name || 'Random from topic pool' }}
            - Ingredients: ${{ github.event.inputs.ingredients || 'Generated by Claude' }}
            - Protein: ${{ github.event.inputs.protein_per_serving || 'Generated by Claude' }}g per serving
            - Cost: ${{ github.event.inputs.cost_per_serving || 'Generated by Claude' }} per serving
            - Notes: ${{ github.event.inputs.notes || 'None' }}

            **Review before merging:**
            - [ ] Recipe title and intro read naturally
            - [ ] Ingredients list matches what you provided
            - [ ] Protein and cost numbers are correct
            - [ ] Instructions make sense end to end
            - [ ] Internal links look correct
            - [ ] Add a cover image before publishing (optional)

            Merging this PR will trigger the deploy workflow and publish the post live.
          labels: "auto-generated, needs-review"
          draft: false

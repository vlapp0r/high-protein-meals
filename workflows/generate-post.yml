name: Generate weekly recipe post

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Generate post via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.js

      - name: Get generated filename
        id: get-filename
        run: |
          FILENAME=$(ls content/posts/*.md | sort | tail -n 1)
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          SLUG=$(basename "$FILENAME" .md)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add generated post: ${{ steps.get-filename.outputs.slug }}"
          branch: "auto/post-${{ steps.get-filename.outputs.slug }}"
          title: "New recipe post: ${{ steps.get-filename.outputs.slug }}"
          body: |
            This post was automatically generated by Claude (claude-sonnet-4-6).

            **Review before merging:**
            - [ ] Recipe title and intro read naturally
            - [ ] Ingredients list is accurate and budget-friendly
            - [ ] Protein/cost numbers are plausible
            - [ ] Internal links look correct
            - [ ] No hallucinated product names or brands
            - [ ] Add a cover image before publishing (optional)

            Merging this PR will trigger the deploy workflow and publish the post live.
          labels: "auto-generated, needs-review"
          draft: false